<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — NXR Esports</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="nav">
    <div class="logo">NXR ESPORTS</div>
    <div id="navbar"></div>
  </div>

  <section class="section panel">
    <form action="https://formspree.io/f/mlgpdvzv" method="POST" class="panel">

  <h2>Contact Us</h2>

  <label>Your Name</label>
  <input type="text" name="name" required>

  <label>Email Address</label>
  <input type="email" name="email" required>

  <label>Message</label>
  <textarea name="message" rows="5" required></textarea>

  <button type="submit" class="btn">Send Message</button>
  <input type="hidden" name="_redirect" value="thankyou.html">
      
</form>
  </section>

  <footer>© 2026 NXR Esports</footer>
  <script>
fetch('navbar.html')
  .then(res => res.text())
  .then(data => document.getElementById('navbar').innerHTML = data);
</script>
</body>

</html>
